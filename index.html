<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monitor CB - Triadas 5M</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f111a; color: #ffffff; padding: 20px; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .card { background: #1c1f2b; border-radius: 8px; padding: 15px; border-top: 4px solid #444; }
        .boom { border-top-color: #00ff88; }
        .crash { border-top-color: #ff4444; }
        .symbol { font-size: 1.2rem; font-weight: bold; color: #9da5b4; }
        .price { font-family: 'Consolas', monospace; font-size: 1.6rem; margin: 10px 0; color: #00d4ff; }
        .alert { background: #ce900033; border: 1px solid #ffcc00; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .info { font-size: 0.8rem; color: #6b7280; }
    </style>
</head>
<body>
    <h2 style="text-align:center;">🚀 Monitor de Triadas (Directo API)</h2>
    <div class="grid" id="grid"></div>

    <script>
        const symbols = [
            {id: 'BOOM150', name: 'Boom 150', type: 'boom'}, {id: '1HZ300V', name: 'Boom 300N', type: 'boom'},
            {id: 'BOOM500', name: 'Boom 500', type: 'boom'}, {id: 'BOOM600', name: 'Boom 600', type: 'boom'},
            {id: 'BOOM900', name: 'Boom 900', type: 'boom'}, {id: 'BOOM1000', name: 'Boom 1000', type: 'boom'},
            {id: 'CRASH150', name: 'Crash 150', type: 'crash'}, {id: '1HZ300UV', name: 'Crash 300N', type: 'crash'},
            {id: 'CRASH500', name: 'Crash 500', type: 'crash'}, {id: 'CRASH600', name: 'Crash 600', type: 'crash'},
            {id: 'CRASH900', name: 'Crash 900', type: 'crash'}, {id: 'CRASH1000', name: 'Crash 1000', type: 'crash'}
        ];

        const grid = document.getElementById('grid');
        const ws = new WebSocket('wss://ws.binaryws.com/websockets/v3?app_id=1089');

        // Crear tarjetas
        symbols.forEach(s => {
            const div = document.createElement('div');
            div.className = `card ${s.type}`;
            div.id = `card-${s.id}`;
            div.innerHTML = `<div class="symbol">${s.name}</div><div class="price" id="price-${s.id}">Conectando...</div><div class="info" id="info-${s.id}">Buscando triada...</div>`;
            grid.appendChild(div);
        });

        ws.onopen = () => {
            symbols.forEach(s => {
                ws.send(JSON.stringify({ "ticks": s.id, "subscribe": 1 }));
            });
        };

        ws.onmessage = (msg) => {
            const data = JSON.parse(msg.data);
            if (data.tick) {
                const id = data.tick.symbol;
                const price = data.tick.quote;
                document.getElementById(`price-${id}`).innerText = price;
                
                // Simulación de detección para que veas el resultado visual
                if (price.toString().slice(-1) === "5") { // Alerta visual de prueba
                    document.getElementById(`card-${id}`).classList.add('alert');
                    document.getElementById(`info-${id}`).innerText = "ZONA DE REACCIÓN";
                } else {
                    document.getElementById(`card-${id}`).classList.remove('alert');
                    document.getElementById(`info-${id}`).innerText = "Escaneando tendencia...";
                }
            }
        };
    </script>
</body>
</html>
